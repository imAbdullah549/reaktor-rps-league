# Frontend CI – market-standard checks:
# - Concurrency: cancel outdated runs for the same branch
# - Install: npm ci with lockfile
# - Audit: fail on high/critical dependency vulnerabilities
# - Format: Prettier check (no write in CI)
# - Lint: ESLint with zero warnings
# - Type check: TypeScript (tsc --noEmit)
# - Test: runs if npm run test exists
# - Build: production build (tsc + vite build)

name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build
